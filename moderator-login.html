<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Moderator Login — CapitalQuest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0E1A;color:#F1F5F9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#111827;border:1px solid #1A2235;border-radius:20px;padding:32px 28px;width:100%;max-width:400px}
.badge{background:#F5C51822;border:1px solid #F5C51855;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;color:#F5C518;text-align:center;margin-bottom:24px;letter-spacing:.04em}
h1{font-size:22px;font-weight:800;margin-bottom:6px}
.sub{font-size:13px;color:#475569;margin-bottom:28px}
label{font-size:13px;font-weight:600;color:#94A3B8;display:block;margin-bottom:6px}
input{width:100%;padding:13px 15px;background:#0A0E1A;border:1.5px solid #1A2235;border-radius:12px;font-size:15px;color:#F1F5F9;outline:none;margin-bottom:16px}
input:focus{border-color:#F5C518}
.btn{width:100%;padding:14px;background:linear-gradient(90deg,#F5C518,#E5B000);border:none;border-radius:12px;color:#0A0E1A;font-size:15px;font-weight:800;cursor:pointer}
.btn:disabled{opacity:.5;cursor:default}
.err{color:#FF3D57;font-size:13px;margin-bottom:14px;display:none;background:#FF3D5711;padding:10px 12px;border-radius:10px;border-left:3px solid #FF3D57}
.back{display:block;text-align:center;margin-top:16px;color:#475569;font-size:13px;text-decoration:none}
.back:hover{color:#94A3B8}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #0A0E1A44;border-top-color:#0A0E1A;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="badge">🛡️ MODERATOR ACCESS ONLY</div>
  <h1>Moderator Login</h1>
  <p class="sub">Restricted area. Authorised personnel only.</p>
  <div class="err" id="err"></div>
  <label>Email Address</label>
  <input id="email" type="email" placeholder="your@email.com" autocomplete="email"/>
  <label>Password</label>
  <input id="pw" type="password" placeholder="••••••••" autocomplete="current-password"/>
  <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
  <a class="back" href="/welcome">← Back to app</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
try{firebase.initializeApp({apiKey:'AIzaSyCP1AcnDTU2umjR3cGycRxQ5mwOFq4Xjgg',authDomain:'capitalquest-4d20b.firebaseapp.com',projectId:'capitalquest-4d20b',storageBucket:'capitalquest-4d20b.firebasestorage.app',messagingSenderId:'407589569541',appId:'1:407589569541:web:3b8a543f03ad9f110ec86c'});}catch(e){}
const auth=firebase.auth();
const ALLOWED=['theosmales1@gmail.com'];

async function doLogin(){
  const email=document.getElementById('email').value.trim().toLowerCase();
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  const btn=document.getElementById('btn');
  err.style.display='none';
  if(!email){err.textContent='Please enter your email.';err.style.display='block';return;}
  if(!ALLOWED.includes(email)){err.textContent='Access denied. This account is not authorised.';err.style.display='block';return;}
  if(!pw){err.textContent='Please enter your password.';err.style.display='block';return;}
  btn.innerHTML='<span class="spinner"></span>Signing in…';btn.disabled=true;
  try{
    await auth.signInWithEmailAndPassword(email,pw);
    window.location.href='/admin-dashboard.html';
  }catch(e){
    if(e.code==='auth/user-not-found'||e.code==='auth/invalid-credential'){
      // First time — create the moderator account
      try{
        await auth.createUserWithEmailAndPassword(email,pw);
        window.location.href='/admin-dashboard.html';
        return;
      }catch(e2){
        err.textContent=e2.message||'Could not create account.';
      }
    }else if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'){
      err.textContent='Incorrect password.';
    }else{
      err.textContent=e.message||'Sign in failed.';
    }
    err.style.display='block';
    btn.innerHTML='Sign In';btn.disabled=false;
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
